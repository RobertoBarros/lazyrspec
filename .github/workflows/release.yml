name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest  # arm64
            target: bun-darwin-arm64
            suffix: arm64
          - os: macos-13      # x86_64 Intel
            target: bun-darwin-x64
            suffix: x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        run: |
          bun build --compile --target=${{ matrix.target }} ./src/index.ts --outfile lazyrspec-${{ matrix.suffix }}

      - name: Strip and sign
        run: |
          strip lazyrspec-${{ matrix.suffix }}
          codesign --sign - --force lazyrspec-${{ matrix.suffix }}

      - name: Create tarball
        id: tarball
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          SUFFIX=${{ matrix.suffix }}
          if [ "$SUFFIX" = "arm64" ]; then
            TARBALL="lazyrspec-${VERSION}-darwin-arm64.tar.gz"
          else
            TARBALL="lazyrspec-${VERSION}-darwin-x86_64.tar.gz"
          fi
          cp "lazyrspec-${SUFFIX}" lazyrspec
          tar czf "$TARBALL" lazyrspec
          rm lazyrspec
          echo "TARBALL=$TARBALL" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.suffix }}
          path: ${{ steps.tarball.outputs.TARBALL }}
          retention-days: 1

  release:
    needs: build
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: binary-arm64

      - uses: actions/download-artifact@v4
        with:
          name: binary-x86_64

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256
        id: sha
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          TARBALL_ARM64="lazyrspec-${VERSION}-darwin-arm64.tar.gz"
          TARBALL_X86="lazyrspec-${VERSION}-darwin-x86_64.tar.gz"
          echo "TARBALL_ARM64=$TARBALL_ARM64"               >> "$GITHUB_OUTPUT"
          echo "TARBALL_X86=$TARBALL_X86"                   >> "$GITHUB_OUTPUT"
          echo "SHA256_ARM64=$(shasum -a 256 "$TARBALL_ARM64" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "SHA256_X86=$(shasum -a 256 "$TARBALL_X86"   | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.sha.outputs.TARBALL_ARM64 }}
            ${{ steps.sha.outputs.TARBALL_X86 }}
          name: ${{ github.ref_name }}

      - name: Update Formula in repo
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          SHA256_ARM64: ${{ steps.sha.outputs.SHA256_ARM64 }}
          SHA256_X86: ${{ steps.sha.outputs.SHA256_X86 }}
        run: |
          TAG="v${VERSION}"
          RELEASE_URL_ARM64="https://github.com/RobertoBarros/lazyrspec/releases/download/${TAG}/lazyrspec-${VERSION}-darwin-arm64.tar.gz"
          RELEASE_URL_X86="https://github.com/RobertoBarros/lazyrspec/releases/download/${TAG}/lazyrspec-${VERSION}-darwin-x86_64.tar.gz"

          cat > Formula/lazyrspec.rb <<RUBY
          class Lazyrspec < Formula
            desc "A lazy TUI for running RSpec tests"
            homepage "https://github.com/RobertoBarros/lazyrspec"
            version "${VERSION}"
            license "MIT"

            on_arm do
              url "${RELEASE_URL_ARM64}"
              sha256 "${SHA256_ARM64}"
            end

            on_intel do
              url "${RELEASE_URL_X86}"
              sha256 "${SHA256_X86}"
            end

            def install
              bin.install "lazyrspec"
            end

            test do
              assert_predicate bin/"lazyrspec", :executable?
            end
          end
          RUBY

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/lazyrspec.rb
          git commit -m "Release ${TAG}"
          git push origin HEAD:master
