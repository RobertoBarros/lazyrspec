name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest  # arm64 — cross-compila x86_64 também
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install cross-compile native packages
        run: |
          # bun/npm bloqueiam pacotes de outra plataforma.
          # Download direto do tarball no npm registry bypassa qualquer checagem.
          X64_VER=$(node -p "require('./package.json').dependencies['@opentui/core-darwin-x64'].replace(/[^0-9.]/g,'')")
          LINUX_VER=$(node -p "require('./package.json').dependencies['@opentui/core-linux-x64'].replace(/[^0-9.]/g,'')")

          mkdir -p node_modules/@opentui/core-darwin-x64
          curl -fsSL "https://registry.npmjs.org/@opentui/core-darwin-x64/-/core-darwin-x64-${X64_VER}.tgz" \
            | tar xz --strip-components=1 -C node_modules/@opentui/core-darwin-x64

          mkdir -p node_modules/@opentui/core-linux-x64
          curl -fsSL "https://registry.npmjs.org/@opentui/core-linux-x64/-/core-linux-x64-${LINUX_VER}.tgz" \
            | tar xz --strip-components=1 -C node_modules/@opentui/core-linux-x64

          mkdir -p node_modules/@opentui/core-linux-arm64
          curl -fsSL "https://registry.npmjs.org/@opentui/core-linux-arm64/-/core-linux-arm64-${LINUX_VER}.tgz" \
            | tar xz --strip-components=1 -C node_modules/@opentui/core-linux-arm64

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: |
          bun build --compile --target=bun-darwin-arm64  ./src/index.ts --outfile lazyrspec-darwin-arm64
          bun build --compile --target=bun-darwin-x64   ./src/index.ts --outfile lazyrspec-darwin-x86_64
          bun build --compile --target=bun-linux-x64    ./src/index.ts --outfile lazyrspec-linux-x86_64
          bun build --compile --target=bun-linux-arm64  ./src/index.ts --outfile lazyrspec-linux-arm64

      - name: Sign macOS binaries
        run: |
          codesign --sign - lazyrspec-darwin-arm64
          codesign --sign - lazyrspec-darwin-x86_64

      - name: Create tarballs
        id: tarballs
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          TARBALL_DARWIN_ARM64="lazyrspec-${VERSION}-darwin-arm64.tar.gz"
          TARBALL_DARWIN_X86="lazyrspec-${VERSION}-darwin-x86_64.tar.gz"
          TARBALL_LINUX_X86="lazyrspec-${VERSION}-linux-x86_64.tar.gz"
          TARBALL_LINUX_ARM64="lazyrspec-${VERSION}-linux-arm64.tar.gz"

          cp lazyrspec-darwin-arm64   lazyrspec && tar czf "$TARBALL_DARWIN_ARM64" lazyrspec && rm lazyrspec
          cp lazyrspec-darwin-x86_64  lazyrspec && tar czf "$TARBALL_DARWIN_X86"   lazyrspec && rm lazyrspec
          cp lazyrspec-linux-x86_64   lazyrspec && tar czf "$TARBALL_LINUX_X86"    lazyrspec && rm lazyrspec
          cp lazyrspec-linux-arm64    lazyrspec && tar czf "$TARBALL_LINUX_ARM64"   lazyrspec && rm lazyrspec

          echo "TARBALL_DARWIN_ARM64=$TARBALL_DARWIN_ARM64"                                          >> "$GITHUB_OUTPUT"
          echo "TARBALL_DARWIN_X86=$TARBALL_DARWIN_X86"                                              >> "$GITHUB_OUTPUT"
          echo "TARBALL_LINUX_X86=$TARBALL_LINUX_X86"                                                >> "$GITHUB_OUTPUT"
          echo "TARBALL_LINUX_ARM64=$TARBALL_LINUX_ARM64"                                            >> "$GITHUB_OUTPUT"
          echo "SHA256_DARWIN_ARM64=$(shasum -a 256 "$TARBALL_DARWIN_ARM64" | awk '{print $1}')"     >> "$GITHUB_OUTPUT"
          echo "SHA256_DARWIN_X86=$(shasum -a 256 "$TARBALL_DARWIN_X86"     | awk '{print $1}')"     >> "$GITHUB_OUTPUT"
          echo "SHA256_LINUX_X86=$(shasum -a 256 "$TARBALL_LINUX_X86"       | awk '{print $1}')"     >> "$GITHUB_OUTPUT"
          echo "SHA256_LINUX_ARM64=$(shasum -a 256 "$TARBALL_LINUX_ARM64"   | awk '{print $1}')"     >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.tarballs.outputs.TARBALL_DARWIN_ARM64 }}
            ${{ steps.tarballs.outputs.TARBALL_DARWIN_X86 }}
            ${{ steps.tarballs.outputs.TARBALL_LINUX_X86 }}
            ${{ steps.tarballs.outputs.TARBALL_LINUX_ARM64 }}
          name: ${{ github.ref_name }}

      - name: Update Formula in repo
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          SHA256_DARWIN_ARM64: ${{ steps.tarballs.outputs.SHA256_DARWIN_ARM64 }}
          SHA256_DARWIN_X86: ${{ steps.tarballs.outputs.SHA256_DARWIN_X86 }}
          SHA256_LINUX_X86: ${{ steps.tarballs.outputs.SHA256_LINUX_X86 }}
          SHA256_LINUX_ARM64: ${{ steps.tarballs.outputs.SHA256_LINUX_ARM64 }}
        run: |
          TAG="v${VERSION}"
          BASE_URL="https://github.com/RobertoBarros/lazyrspec/releases/download/${TAG}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git checkout -B master origin/master

          cat > Formula/lazyrspec.rb <<RUBY
          class Lazyrspec < Formula
            desc "A lazy TUI for running RSpec tests"
            homepage "https://github.com/RobertoBarros/lazyrspec"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE_URL}/lazyrspec-${VERSION}-darwin-arm64.tar.gz"
                sha256 "${SHA256_DARWIN_ARM64}"
              end

              on_intel do
                url "${BASE_URL}/lazyrspec-${VERSION}-darwin-x86_64.tar.gz"
                sha256 "${SHA256_DARWIN_X86}"
              end
            end

            on_linux do
              on_arm do
                url "${BASE_URL}/lazyrspec-${VERSION}-linux-arm64.tar.gz"
                sha256 "${SHA256_LINUX_ARM64}"
              end

              on_intel do
                url "${BASE_URL}/lazyrspec-${VERSION}-linux-x86_64.tar.gz"
                sha256 "${SHA256_LINUX_X86}"
              end
            end

            def install
              bin.install "lazyrspec"
            end

            test do
              assert_predicate bin/"lazyrspec", :executable?
            end
          end
          RUBY

          git add Formula/lazyrspec.rb
          git commit -m "Release ${TAG}"
          git push origin master
